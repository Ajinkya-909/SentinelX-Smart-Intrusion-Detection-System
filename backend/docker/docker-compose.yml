version: "3.8"

services:
  # PostgreSQL Database
  postgres-db:
    image: postgres:16
    container_name: sentinelx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: sentinelx_ids
    ports:
      - "5432:5432"
    volumes:
      - sentinelx_pgdata:/var/lib/postgresql/data
    networks:
      - sentinelx-network

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: sentinelx_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sentinelx_redis_data:/data
    command: redis-server --appendonly yes --loglevel warning
    networks:
      - sentinelx-network

volumes:
  sentinelx_pgdata:
    driver: local
  sentinelx_redis_data:
    driver: local

networks:
  sentinelx-network:
    driver: bridge
